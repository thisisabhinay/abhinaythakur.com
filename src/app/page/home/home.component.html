<div class="row">
    <div class="col">
        <app-intro></app-intro>
    </div>
</div>

<div class="row" *ngFor="let feature of resumeFeatures">
    <div class="col resume-section" *ngIf="feature==='experience'">
        <div class="row">
            <div class="col">
                <app-header-section title="Professional Experience"></app-header-section>
            </div>
        </div>
        <div class="row" *ngFor="let item of resume[feature]">
            <div class="col">
                <h3>{{item.designation}}</h3>
                <h5>{{item.years}}</h5>
                <h5>{{item.company}}</h5>
                <h5>{{item.location}}</h5>
                <ul>
                    <li *ngFor="let point of item.description">

                        <p>{{point.text}}</p>

                        <ul *ngIf="point.description">

                            <li *ngFor="let nestedPoint of point.description">

                                <p class="text-bold">{{nestedPoint.heading}}</p>
                                <p>{{nestedPoint.text}}</p>

                            </li>

                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </div>
    <div class="col resume-section" *ngIf="feature==='education'">
        <div class="row">
            <div class="col">
                <app-header-section title="Education"></app-header-section>
            </div>
        </div>
        <div class="row" *ngFor="let item of resume[feature]">
            <div class="col">
                <h3>{{item.institute}}</h3>
                <h5>{{item.years}}</h5>
                <h5>{{item.course}}</h5>
                <h5>{{item.location}}</h5>
            </div>
        </div>
    </div>
    <div class="col resume-section" *ngIf="feature==='skills'">
        <div class="row">
            <div class="col">
                <app-header-section title="Skills & Expertise"></app-header-section>
            </div>
        </div>
        <div class="row" *ngFor="let item of resume[feature]">
            <div class="col">
                <h3>{{item.domain}}</h3>
                <ul>
                    <li *ngFor="let skill of item.skills">
                        {{skill}}
                    </li>
                </ul>
            </div>
        </div>
    </div>
    <div class="col resume-section" *ngIf="feature==='contact'">
        <div class="row">
            <div class="col">
                <app-header-section title="Contact"></app-header-section>
            </div>
        </div>
        <div class="row" *ngFor="let item of resume[feature]">
            <div class="col">
                <h3>{{item.title}}</h3>
                <h5>{{item.description}}</h5>
            </div>
        </div>
        <app-social-icons></app-social-icons>
    </div>
</div>
