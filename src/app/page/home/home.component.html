<div class="row">
    <div class="col">
        <app-intro></app-intro>
    </div>
</div>

<!-- EXPERIENCE -->
<div class="row">
    <div class="col-12">
        <app-experience [data]="resume['experience']" layoutContext="home" feature="experience"></app-experience>
    </div>
</div>

<!-- EDUCATION -->
<div class="row">
    <div class="col-12">
        <app-education [data]="resume['education']" layoutContext="home" feature="education"></app-education>
    </div>
</div>

<div class="row" *ngFor="let feature of resumeFeatures">
    <!-- SKILLS -->
    <div class="col resume-section section-skills" *ngIf="feature==='skills'">
        <div class="row">
            <div class="col">
                <app-header-section id="{{feature}}" title="Skills & Expertise"></app-header-section>
            </div>
        </div>
        <div class="row">
            <div class="col-12 col-sm-6 col-lg-3" *ngFor="let item of resume[feature]">
                <h2 class="no-margin">
                    {{item.domain}}
                </h2>
                <app-list [list]="item.skills"></app-list>
            </div>
        </div>
    </div>

    <!-- CONTACT -->
    <div class="col resume-section" *ngIf="feature==='contact'">
        <div class="row">
            <div class="col">
                <app-header-section id="{{feature}}" title="Contact"></app-header-section>
            </div>
        </div>
        <div class="row" *ngFor="let item of resume[feature]">
            <div class="col-7">
                <h2 class="no-margin">
                    {{item.title}}
                </h2>
                <h4 class="no-margin">
                    {{item.description}}
                </h4>
            </div>
        </div>
        <app-social-icons></app-social-icons>
    </div>
</div>
