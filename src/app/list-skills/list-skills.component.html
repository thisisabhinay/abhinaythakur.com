<ul class="at-list-skills">
    <li class="at-list__item" *ngFor="let item of list">
        <p class="bold at-item__heading" *ngIf="item.heading">{{item.heading}}</p>

        <p class="at-item__text">{{item.text}}</p>

        <app-list *ngIf=" item.description" [list]="item.description"></app-list>
    </li>
</ul>
